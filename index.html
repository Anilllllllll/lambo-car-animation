<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lambo 3D Experience | Industry Level</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <div id="canvas-container"></div>
        
        <div id="hud">
            <div class="distance-box">
                <span id="distance-value">0</span>
                <span class="unit">Meters</span>
            </div>
            <div class="speedometer">
                <span id="speed-value">0</span>
                <span class="unit">KM/H</span>
            </div>
            <div class="controls-hint">
                <p>WASD / ARROWS TO DRIVE</p>
                <p>SPACE TO BRAKE</p>
            </div>
        </div>

        <div id="crash-overlay">
            <h1>CRASHED!</h1>
            <p>Restarting Engine...</p>
        </div>

        <div id="countdown-overlay">
            <div id="countdown-number">3</div>
        </div>

        <div id="loading-screen">
            <div class="loader"></div>
            <h1>IGNITING ENGINE...</h1>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <div class="control-group movement">
                <button id="btn-forward" class="ctrl-btn">▲</button>
                <button id="btn-backward" class="ctrl-btn">▼</button>
            </div>
            <div class="control-group steering">
                <button id="btn-left" class="ctrl-btn">◀</button>
                <button id="btn-right" class="ctrl-btn">▶</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
